<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>閭欢鏌ョ湅鍣?/title>
  <style>
    :root {
      --header-start: #5e69c9;
      --header-end: #7460c7;
      --header-highlight: rgba(255, 255, 255, 0.18);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.78);
      --page: #f6f7fb;
      --border: rgba(255, 255, 255, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background: var(--page);
      color: #1d2433;
    }

    .site-header {
      position: relative;
      overflow: hidden;
      min-height: 144px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 26px;
      background:
        radial-gradient(circle at 18% 28%, rgba(255, 255, 255, 0.14) 0 1px, transparent 2px),
        radial-gradient(circle at 74% 16%, rgba(255, 255, 255, 0.1) 0 1px, transparent 2px),
        linear-gradient(135deg, var(--header-start), var(--header-end));
      color: var(--text);
    }

    .header-inner {
      width: min(760px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-size: clamp(28px, 5vw, 36px);
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-icon {
      width: 38px;
      height: 38px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 9px;
      background: rgba(255, 255, 255, 0.1);
    }

    .brand-icon svg {
      width: 34px;
      height: 34px;
      fill: currentColor;
    }

    .notice {
      max-width: 100%;
      padding: 10px 18px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--header-highlight);
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
      line-height: 1.35;
      backdrop-filter: blur(4px);
    }

    .content {
      width: min(760px, calc(100% - 32px));
      margin: 28px auto;
      padding: 24px;
      border-radius: 8px;
      background: #ffffff;
      color: #596275;
      text-align: center;
      font-size: 15px;
      box-shadow: 0 8px 24px rgba(30, 39, 68, 0.08);
    }

    @media (max-width: 520px) {
      .site-header {
        min-height: 132px;
        padding-inline: 12px;
      }

      .brand {
        gap: 10px;
      }

      .brand-icon {
        width: 34px;
        height: 34px;
      }

      .brand-icon svg {
        width: 30px;
        height: 30px;
      }

      .notice {
        width: 100%;
        border-radius: 18px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand" aria-label="閭欢鏌ョ湅鍣?>
        <span class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img">
            <path d="M20 4h-3.2L15 2H9L7.2 4H4a2 2 0 0 0-2 2v12.5A3.5 3.5 0 0 0 5.5 22h13a3.5 3.5 0 0 0 3.5-3.5V6a2 2 0 0 0-2-2Zm-8 9.2L4 8.7V6h16v2.7l-8 4.5Zm0 2.3 8-4.5v7.5a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 4 18.5V11l8 4.5ZM10 4h4l.9 1H9.1L10 4Z"/>
          </svg>
        </span>
        <span>閭欢鏌ョ湅鍣?/span>
      </div>
      <div class="notice">濡傞渶甯姪锛岃鑱旂郴缃戠珯瀹㈡湇</div>
    </div>
  </header>

  <main class="content">
    椤甸潰宸插噯澶囧ソ閮ㄧ讲鍒?GitHub Pages銆傝繖閲屽彲浠ョ户缁帴鍏ヤ綘鑷繁鐨勫悎娉曚笟鍔″唴瀹广€?  </main>
</body>
</html>
